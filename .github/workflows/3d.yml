name: Generate 3D contribution

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Keep this group identical to snake.yml because both workflows push to main.
concurrency:
  group: profile-contribution-assets
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: generate 3d contribution graphs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: xiaoaozz

      - name: commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-3d-contrib/*.svg
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: update 3d contribution graph"
          git pull --rebase origin main
          git push origin HEAD:main
