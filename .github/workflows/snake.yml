name: Generate Snake Animation

on:
  # 每天 UTC 00:00 触发
  schedule:
    - cron: "0 0 * * *"
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure assets directory exists
        run: mkdir -p assets

      - name: Generate Snake SVG (light)
        uses: Platane/Platane/output@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          path: assets/github-contribution-grid-snake.svg

      - name: Generate Snake SVG (dark)
        uses: Platane/Platane/output@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          path: assets/github-contribution-grid-snake-dark.svg

      - name: Generate Snake GIF
        uses: Platane/Platane/output@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          path: assets/github-contribution-grid-snake.gif

      - name: Generate Snake GIF (dark)
        uses: Platane/Platane/output@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          path: assets/github-contribution-grid-snake-dark.gif

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🐍 update snake animation"
            git push
          fi