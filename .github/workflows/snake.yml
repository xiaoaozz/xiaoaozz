name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Snake and 3D both write generated assets to main. Use the same concurrency
# group in both workflows so their commits cannot race with each other.
concurrency:
  group: profile-contribution-assets
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: xiaoaozz
          outputs: |
            profile-snake-contrib/github-contribution-grid-snake.svg
            profile-snake-contrib/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-snake-contrib/*.svg
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: update snake contribution animation"
          git pull --rebase origin main
          git push origin HEAD:main
